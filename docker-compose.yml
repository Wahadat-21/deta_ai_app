version: "3.9"

services:

  postgres:
    image: postgres:16

    restart: always

    environment:
      POSTGRES_USER: dental
      POSTGRES_PASSWORD: dental
      POSTGRES_DB: dental_ai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    ports:
      - "6379:6379"

volumes:
  postgres_data:
